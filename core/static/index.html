<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>局域网照片共享</title>
    <meta name="theme-color" content="#176b87" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="照片共享" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen" hidden>
      <div id="loginBackdrop" class="login-backdrop" aria-hidden="true"></div>
      <div class="login-panel">
        <div class="login-brand">
          <div class="login-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 7.5A3.5 3.5 0 0 1 7.5 4h9A3.5 3.5 0 0 1 20 7.5v9a3.5 3.5 0 0 1-3.5 3.5h-9A3.5 3.5 0 0 1 4 16.5z"></path>
              <path d="m7 15 2.7-2.7a1.2 1.2 0 0 1 1.7 0l1.1 1.1 1.9-1.9a1.2 1.2 0 0 1 1.7 0L20 15.4"></path>
              <path d="M8.8 8.7h.1"></path>
            </svg>
          </div>
          <div>
            <div class="login-title">照片库访问</div>
            <div class="login-subtitle">输入管理员密码，或以游客身份进入公开相册。</div>
          </div>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            管理员密码
            <input id="loginPasswordInput" type="password" autocomplete="current-password" placeholder="输入密码" />
          </label>
          <div id="loginStatus" class="login-status"></div>
          <button type="submit">进入管理模式</button>
          <button id="guestLoginBtn" class="ghost" type="button">游客登录</button>
        </form>
      </div>
    </section>
    <header class="topbar">
      <div id="topbarActions" class="actions">
        <button id="openUploadBtn" class="with-icon" type="button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 16V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <path d="M5 20h14"></path>
            </svg>
          </span>
          <span>上传</span>
        </button>
        <button id="openSettingsBtn" class="ghost with-icon settings-action" type="button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3h.1a1.6 1.6 0 0 0 .9-1.5V3a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8v.1a1.6 1.6 0 0 0 1.5.9h.2a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1Z"></path>
            </svg>
          </span>
          <span>设置</span>
        </button>
      </div>
    </header>
    <div id="warmupBanner" class="warmup-banner" hidden>
      <div class="warmup-row">
        <div>
          <div id="warmupTitle" class="warmup-title">正在预热缩略图</div>
          <div id="warmupDetail" class="warmup-detail">正在准备...</div>
        </div>
        <div id="warmupPercent" class="warmup-percent">0%</div>
      </div>
      <div class="warmup-progress" aria-hidden="true">
        <div id="warmupProgressFill" class="warmup-progress-fill"></div>
      </div>
    </div>

    <main>
      <section class="browse-bar" aria-label="浏览工具">
        <nav id="breadcrumb" class="breadcrumb"></nav>
        <div class="browse-actions">
          <label class="thumb-mode-control">
            <span>预览大小</span>
            <select id="thumbModeSelect">
              <option value="small">小</option>
              <option value="medium">中</option>
              <option value="large">大</option>
              <option value="xlarge">超大</option>
            </select>
          </label>
          <button id="filterPanelToggleBtn" class="ghost" type="button" aria-expanded="false" aria-controls="filterPanel">筛选</button>
          <button id="compactToggleBtn" class="ghost" type="button">精简</button>
          <div id="selectionBar" class="selection-bar" hidden>
            <span id="selectionCount">已选择 0 项</span>
            <button id="copySelectedBtn" class="ghost" type="button">复制</button>
            <button id="cutSelectedBtn" class="ghost" type="button">剪切</button>
            <button id="downloadSelectedBtn" class="ghost" type="button">下载</button>
            <button id="deleteSelectedBtn" class="danger" type="button">删除</button>
            <button id="moveSelectedBtn" class="ghost" type="button">移动</button>
            <button id="invertSelectionBtn" class="ghost" type="button">反选</button>
            <button id="exitSelectionBtn" class="ghost" type="button">退出多选</button>
          </div>
        </div>
      </section>
      <section id="filterPanel" class="filters" aria-label="筛选" hidden>
        <div class="filter-field rating-filter-field">
          <span>星级</span>
          <button id="ratingFilterBtn" class="filter-select" type="button" aria-expanded="false">全部</button>
          <div id="ratingFilterMenu" class="rating-filter-menu" hidden>
            <label><input type="checkbox" value="0" /> 未评分</label>
            <label><input type="checkbox" value="1" /> 1 星</label>
            <label><input type="checkbox" value="2" /> 2 星</label>
            <label><input type="checkbox" value="3" /> 3 星</label>
            <label><input type="checkbox" value="4" /> 4 星</label>
            <label><input type="checkbox" value="5" /> 5 星</label>
          </div>
        </div>
        <label>
          开始日期
          <input id="dateFromFilter" type="date" />
        </label>
        <label>
          结束日期
          <input id="dateToFilter" type="date" />
        </label>
        <button id="clearFiltersBtn" class="ghost" type="button">清除筛选</button>
      </section>
      <section id="grid" class="grid" aria-live="polite"></section>
      <div id="emptyState" class="empty" hidden>当前文件夹没有媒体文件或子文件夹。</div>
    </main>

    <button id="scrollTopBtn" class="scroll-top-btn" type="button" aria-label="回到顶部" hidden>↑</button>

    <div id="folderContextMenu" class="context-menu" hidden></div>
    <div id="blankContextMenu" class="context-menu" hidden></div>
    <div id="itemContextMenu" class="context-menu" hidden></div>
    <div id="selectionBox" class="selection-box" hidden></div>
    <div id="pluginDialogs"></div>

    <dialog id="settingsDialog" class="settings-dialog">
      <form method="dialog" class="settings-panel">
        <aside class="settings-sidebar" aria-label="设置分类">
          <div class="settings-brand">
            <div class="settings-title">设置</div>
            <div class="settings-subtitle">管理核心服务和扩展能力</div>
          </div>
          <button class="settings-tab active" type="button" data-settings-tab="general" aria-current="page">通用设置</button>
          <button class="settings-tab" type="button" data-settings-tab="auth">访问控制</button>
          <button class="settings-tab" type="button" data-settings-tab="plugins">插件</button>
          <div id="pluginSettingsTabs" class="plugin-settings-tabs"></div>
        </aside>
        <section class="settings-content">
          <div class="settings-header">
            <div>
              <div id="settingsKicker" class="settings-kicker">通用</div>
              <h2 id="settingsPageTitle">通用设置</h2>
              <p id="settingsPageDescription">调整核心服务的运行策略。</p>
            </div>
            <button id="closeSettingsBtn" class="settings-close" type="button" aria-label="关闭设置">×</button>
          </div>
          <div id="settingsStatus" class="settings-status"></div>
          <div id="generalSettingsPanel" class="settings-page">
            <section class="settings-card">
              <div class="settings-card-head">
                <h3>界面主题</h3>
                <button class="settings-help" type="button" aria-label="查看主题说明">?</button>
                <div class="settings-help-popover" role="tooltip">
                  跟随系统会根据手机、平板或桌面操作系统的浅色/深色外观自动切换。也可以手动固定为浅色或深色。
                </div>
              </div>
              <div class="settings-control-grid">
                <label class="settings-field">
                  <span>主题</span>
                  <select id="themeModeSelect">
                    <option value="system">跟随系统</option>
                    <option value="light">浅色</option>
                    <option value="dark">深色</option>
                  </select>
                </label>
              </div>
            </section>
            <section class="settings-card">
              <div class="settings-card-head">
                <h3>启用内存预取</h3>
                <button class="settings-help" type="button" aria-label="查看内存预取说明">?</button>
                <div class="settings-help-popover" role="tooltip">
                  打开文件夹并查看原图时，服务端会提前把当前图片前 5 张、后 35 张照片读入共享内存池，减少机械硬盘读取延迟。多用户共享同一个内存池，退出文件夹或关闭系统会释放对应预取内容。
                </div>
              </div>
              <div class="settings-control-grid">
                <label class="switch-row">
                  <span>启用</span>
                  <input id="memoryPrefetchEnabledInput" type="checkbox" />
                </label>
                <label class="settings-field">
                  <span>内存上限 MB</span>
                  <input id="memoryPrefetchLimitInput" type="number" min="256" step="128" />
                </label>
              </div>
            </section>
          </div>
          <div id="authSettingsPanel" class="settings-page" hidden>
            <section class="settings-card auth-settings-card">
              <div class="settings-card-head">
                <h3>登录保护</h3>
              </div>
              <div class="settings-control-grid">
                <label class="switch-row">
                  <span>启用登录页</span>
                  <input id="authEnabledInput" type="checkbox" />
                </label>
                <label class="settings-field auth-password-field">
                  <span>管理员密码</span>
                  <span class="auth-password-control">
                    <input id="authPasswordInput" type="password" autocomplete="new-password" placeholder="留空则不修改" />
                    <button id="saveAuthPasswordBtn" class="ghost" type="button">保存密码</button>
                  </span>
                </label>
              </div>
            </section>
            <section class="settings-card auth-settings-card">
              <div class="settings-card-head">
                <h3>登录背景</h3>
              </div>
              <div class="settings-control-grid">
                <div class="segmented-control auth-background-mode" role="group" aria-label="登录背景模式">
                  <button type="button" data-login-background-mode="none">无背景</button>
                  <button type="button" data-login-background-mode="rated">评分图集</button>
                  <button type="button" data-login-background-mode="folder">文件夹图集</button>
                </div>
                <label class="settings-field auth-background-folder-field">
                  <span>图集文件夹</span>
                  <span class="auth-background-folder-control">
                    <input id="loginBackgroundFolderInput" type="text" placeholder="例如 root1/Public" />
                    <button id="useCurrentLoginBackgroundFolderBtn" class="ghost" type="button">当前文件夹</button>
                  </span>
                </label>
              </div>
            </section>
          </div>
          <div id="pluginsSettingsPanel" class="settings-page" hidden>
            <div id="pluginComponentList" class="plugin-list"></div>
          </div>
          <div id="pluginSettingsPages"></div>
        </section>
      </form>
    </dialog>

    <dialog id="viewer" class="viewer">
      <div class="viewer-shell">
        <div class="viewer-toolbar">
          <div class="viewer-title" id="viewerTitle"></div>
          <button id="closeBtn" type="button">关闭</button>
        </div>
        <div class="viewer-control-bar">
          <div class="viewer-actions">
            <button id="zoomResetBtn" type="button">100%</button>
            <div class="viewer-rating-picker">
              <button id="viewerRatingBtn" type="button" aria-expanded="false" aria-controls="viewerRatingMenu">☆</button>
              <div id="viewerRatingMenu" class="viewer-rating-menu" hidden></div>
            </div>
            <button id="livePhotoBtn" type="button" hidden>播放实况</button>
            <button id="rotateBtn" class="icon-button" type="button" aria-label="顺时针旋转" title="顺时针旋转">↻</button>
            <button id="infoBtn" class="icon-button info-icon-button" type="button" aria-label="照片信息" title="照片信息">i</button>
            <button id="downloadBtn" type="button">下载</button>
            <button id="deleteBtn" class="danger" type="button">删除</button>
          </div>
        </div>
        <div id="photoInfoPanel" class="photo-info-panel" hidden>
          <div class="photo-info-header">
            <div>照片信息</div>
            <button id="closeInfoBtn" type="button" aria-label="关闭照片信息">×</button>
          </div>
          <div id="photoInfoBody" class="photo-info-body"></div>
        </div>
        <div id="imageStage" class="image-stage">
          <img id="viewerImage" alt="" />
          <video id="viewerVideo" controls playsinline hidden></video>
        </div>
        <button id="prevBtn" class="page-btn page-prev" type="button" aria-label="上一张">‹</button>
        <button id="nextBtn" class="page-btn page-next" type="button" aria-label="下一张">›</button>
      </div>
    </dialog>

    <dialog id="deleteDialog" class="confirm-dialog">
      <form method="dialog" class="confirm-panel">
        <div class="confirm-title">删除这张照片？</div>
        <div id="deleteDialogMode" class="confirm-message"></div>
        <div id="deleteDialogPath" class="confirm-path"></div>
        <div class="confirm-actions">
          <button id="cancelDeleteBtn" class="ghost" value="cancel" type="button">取消</button>
          <button id="confirmDeleteBtn" class="danger" value="confirm" type="button">确认删除</button>
        </div>
      </form>
    </dialog>

    <dialog id="uploadDialog" class="upload-dialog">
      <form id="uploadForm" class="upload-panel">
        <div class="upload-header">
          <div>
            <div class="upload-title">上传照片</div>
            <div id="uploadRootLabel" class="upload-target"></div>
          </div>
          <button id="closeUploadBtn" class="ghost" type="button">关闭</button>
        </div>
        <label>
          文件夹
          <input id="uploadFolderInput" name="folder" type="text" autocomplete="off" placeholder="例如 2026-05-10" />
        </label>
        <label id="uploadPasswordLabel" hidden>
          上传密码
          <input id="uploadPasswordInput" name="password" type="password" autocomplete="current-password" />
        </label>
        <label>
          文件
          <input
            id="uploadFilesInput"
            name="files"
            type="file"
            multiple
            accept="image/*,video/*,.jpg,.jpeg,.heic,.heif,.mov,.m4v,.mp4"
          />
        </label>
        <div id="uploadStatus" class="upload-status"></div>
        <div class="upload-actions">
          <button id="createUploadFolderBtn" class="ghost" type="button">新建文件夹</button>
          <button id="submitUploadBtn" type="submit">开始上传</button>
        </div>
      </form>
    </dialog>

    <script src="/static/js/state.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ratings-ui.js"></script>
    <script src="/static/js/thumbnails.js"></script>
    <script src="/static/js/context-menu.js"></script>
    <script src="/static/js/plugins.js"></script>
    <script src="/static/js/warmup.js"></script>
    <script src="/static/js/gallery.js"></script>
    <script src="/static/js/viewer-core.js"></script>
    <script src="/static/js/viewer-cache.js"></script>
    <script src="/static/js/viewer-zoom.js"></script>
    <script src="/static/js/viewer-actions.js"></script>
    <script src="/static/js/uploads.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/pwa.js"></script>
    <script src="/static/js/events.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
