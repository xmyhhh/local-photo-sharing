<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>局域网照片共享</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>照片共享</h1>
        <div id="rootPath" class="subtle"></div>
        <div id="rootSelector" class="root-selector"></div>
      </div>
      <div class="actions">
        <button id="backBtn" class="ghost" type="button">返回上级</button>
        <button id="refreshBtn" type="button">刷新</button>
      </div>
    </header>

    <main>
      <section class="filters" aria-label="筛选">
        <div class="filter-field rating-filter-field">
          <span>星级</span>
          <button id="ratingFilterBtn" class="filter-select" type="button" aria-expanded="false">全部</button>
          <div id="ratingFilterMenu" class="rating-filter-menu" hidden>
            <label><input type="checkbox" value="0" /> 未评分</label>
            <label><input type="checkbox" value="1" /> 1 星</label>
            <label><input type="checkbox" value="2" /> 2 星</label>
            <label><input type="checkbox" value="3" /> 3 星</label>
            <label><input type="checkbox" value="4" /> 4 星</label>
            <label><input type="checkbox" value="5" /> 5 星</label>
          </div>
        </div>
        <label>
          开始日期
          <input id="dateFromFilter" type="date" />
        </label>
        <label>
          结束日期
          <input id="dateToFilter" type="date" />
        </label>
        <label>
          预览大小
          <select id="thumbModeSelect">
            <option value="small">小</option>
            <option value="medium">中</option>
            <option value="large">大</option>
            <option value="xlarge">超大</option>
          </select>
        </label>
        <button id="clearFiltersBtn" class="ghost" type="button">清除筛选</button>
      </section>
      <nav id="breadcrumb" class="breadcrumb"></nav>
      <section id="grid" class="grid" aria-live="polite"></section>
      <div id="emptyState" class="empty" hidden>当前文件夹没有 JPG 图片或子文件夹。</div>
    </main>

    <div id="folderContextMenu" class="context-menu" hidden>
      <button id="detectBracketsBtn" type="button">检测包围曝光</button>
    </div>

    <dialog id="bracketDialog" class="bracket-dialog">
      <div class="bracket-panel">
        <div class="bracket-header">
          <div>
            <div class="bracket-title">包围曝光检测</div>
            <div id="bracketDialogPath" class="bracket-path"></div>
          </div>
          <button id="closeBracketDialogBtn" class="ghost" type="button">关闭</button>
        </div>
        <div id="bracketCacheActions" class="bracket-cache-actions" hidden>
          <span>已有这个文件夹的扫描结果。</span>
          <button id="useBracketCacheBtn" type="button">使用结果</button>
          <button id="rescanBracketsBtn" class="ghost" type="button">重新扫描</button>
        </div>
        <div id="bracketStatus" class="bracket-status"></div>
        <div id="bracketMergePanel" class="bracket-merge-panel" hidden>
          <label><input id="selectAllBracketGroups" type="checkbox" /> 全选</label>
          <label>算法
            <select id="mergeAlgorithm">
              <option value="fusion">Fusion</option>
              <option value="debevec">Debevec</option>
              <option value="robertson">Robertson</option>
            </select>
          </label>
          <label>曝光 <input id="mergeExposure" type="number" step="0.1" min="-2" max="2" value="0" /></label>
          <label>对比度 <input id="mergeContrast" type="number" step="0.05" min="0.5" max="2" value="1" /></label>
          <label>饱和度 <input id="mergeSaturation" type="number" step="0.05" min="0" max="2" value="1" /></label>
          <label>锐化 <input id="mergeSharpen" type="number" step="0.1" min="0" max="2" value="0.2" /></label>
          <label>质量 <input id="mergeQuality" type="number" step="1" min="70" max="98" value="92" /></label>
          <button id="mergeBracketsBtn" type="button">合成选中组</button>
        </div>
        <div id="bracketMergeOutput" class="bracket-merge-output" hidden></div>
        <div id="bracketResults" class="bracket-results"></div>
      </div>
    </dialog>

    <dialog id="viewer" class="viewer">
      <div class="viewer-shell">
        <div class="viewer-toolbar">
          <div class="viewer-title" id="viewerTitle"></div>
          <div class="viewer-actions">
            <button id="zoomOutBtn" type="button">-</button>
            <button id="zoomResetBtn" type="button">100%</button>
            <button id="zoomInBtn" type="button">+</button>
            <button id="downloadBtn" type="button">下载</button>
            <button id="deleteBtn" class="danger" type="button">删除</button>
            <button id="closeBtn" type="button">关闭</button>
          </div>
        </div>
        <div id="imageStage" class="image-stage">
          <img id="viewerImage" alt="" />
        </div>
        <button id="prevBtn" class="page-btn page-prev" type="button" aria-label="上一张">‹</button>
        <button id="nextBtn" class="page-btn page-next" type="button" aria-label="下一张">›</button>
        <div class="viewer-rating" id="viewerRating"></div>
      </div>
    </dialog>

    <dialog id="deleteDialog" class="confirm-dialog">
      <form method="dialog" class="confirm-panel">
        <div class="confirm-title">删除这张照片？</div>
        <div id="deleteDialogPath" class="confirm-path"></div>
        <div class="confirm-actions">
          <button id="cancelDeleteBtn" class="ghost" value="cancel" type="button">取消</button>
          <button id="confirmDeleteBtn" class="danger" value="confirm" type="button">确认删除</button>
        </div>
      </form>
    </dialog>

    <script src="/static/js/state.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ratings-ui.js"></script>
    <script src="/static/js/thumbnails.js"></script>
    <script src="/static/js/gallery.js"></script>
    <script src="/static/js/brackets.js"></script>
    <script src="/static/js/viewer-core.js"></script>
    <script src="/static/js/viewer-cache.js"></script>
    <script src="/static/js/viewer-zoom.js"></script>
    <script src="/static/js/viewer-actions.js"></script>
    <script src="/static/js/events.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
